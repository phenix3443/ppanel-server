name: Auto Tag Release

on:
  pull_request_target:
    types:
      - closed
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  tag-release:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Fetch tags
        run: git fetch --tags origin

      - name: Skip if HEAD already tagged
        id: existing
        run: |
          current_tag="$(git tag --points-at "${{ github.event.pull_request.merge_commit_sha }}" --list 'v[0-9]*' | sort -V | tail -n 1)"
          if [ -n "${current_tag}" ]; then
            echo "tag=${current_tag}" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next tag
        if: steps.existing.outputs.skip != 'true'
        id: next
        shell: bash
        run: |
          latest_tag="$(git tag --list 'v[0-9]*' | sort -V | tail -n 1)"
          if [ -z "${latest_tag}" ]; then
            next_tag="v1.0.0"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "${version}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.existing.outputs.skip != 'true'
        env:
          TAG_NAME: ${{ steps.next.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${TAG_NAME}" "${{ github.event.pull_request.merge_commit_sha }}"
          git push origin "${TAG_NAME}"

      - name: Report result
        run: |
          if [ "${{ steps.existing.outputs.skip }}" = "true" ]; then
            echo "HEAD already tagged with ${{ steps.existing.outputs.tag }}"
          else
            echo "Created new release tag ${{ steps.next.outputs.tag }}"
          fi
